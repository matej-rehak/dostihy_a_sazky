<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏇 Dostihy a sázky</title>
  <meta name="description" content="Digitální multiplayer verze klasické české deskové hry Dostihy a sázky"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ LOBBY -->
<div id="lobby-view">
  <div class="lobby-bg-glow"></div>

  <div class="lobby-card">
    <div class="lobby-hero">
      <div class="lobby-emoji">🏇</div>
      <h1 class="lobby-title">DOSTIHY<br/>A SÁZKY</h1>
      <p class="lobby-sub">Česká desková hra pro 2–6 hráčů</p>
    </div>

    <!-- Join form (hidden after joining) -->
    <div id="join-form">
      <input id="name-input" class="text-input" type="text"
             placeholder="Tvoje jméno..." maxlength="20" autocomplete="off"/>
      <p class="label-sm">Vyber barvu figurky:</p>
      <div id="color-picker" class="color-picker"></div>
      <button id="join-btn" class="btn btn-gold btn-lg">Vstoupit do lobby →</button>
    </div>

    <!-- Waiting (shown after joining) -->
    <div id="joined-wait" class="hidden">
      <p class="joined-text">✅ Jste v lobby! Čeká se na hráče...</p>
    </div>

    <!-- Player list -->
    <div class="lobby-players-wrap">
      <p class="label-sm">Hráči v lobby:</p>
      <div id="lobby-players"><p class="dim">Zatím nikdo...</p></div>
    </div>

    <!-- Host controls -->
    <div id="host-controls" class="hidden">
      <button id="start-btn" class="btn btn-green btn-lg" disabled>
        ▶ Spustit hru (min. 2 hráči)
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ GAME -->
<div id="game-view" class="hidden">

  <!-- Board -->
  <div id="board-wrap">
    <div id="board">
      <!-- Board center (spaces added dynamically around it) -->
      <div id="board-center">
        <div class="bc-track-ring"></div>
        <div class="bc-logo">🏇</div>
        <h2 class="bc-title">DOSTIHY<br/>A SÁZKY</h2>
        <div class="bc-divider"></div>
        <div id="bc-turn" class="bc-turn"></div>
        <div id="bc-dice" class="bc-dice"></div>
        <div id="bc-round" class="bc-round">Kolo 1</div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">

    <section id="players-section">
      <h2 class="section-title">Hráči</h2>
      <div id="players-list"></div>
    </section>

    <section id="action-section">
      <h2 class="section-title" id="action-title">Akce</h2>
      <div id="action-content"><p class="dim">Čekám na hru...</p></div>
    </section>

    <section id="log-section">
      <h2 class="section-title">Průběh</h2>
      <div id="log-list"></div>
    </section>

  </div>
</div>

<!-- Tooltip -->
<div id="space-tip" class="space-tip hidden"></div>

<!-- Toast error -->
<div id="toast" class="toast hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
