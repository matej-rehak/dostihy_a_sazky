<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dostihy a sazky</title>
  <meta name="description" content="Digitalni multiplayer verze klasicke ceske deskove hry Dostihy a sazky" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-right-controls">
    <button id="settings-toggle-btn" class="btn-icon header-btn" onclick="window.toggleSettingsModal()" aria-label="Otevřít nastavení" title="Nastavení">
      ⚙️
    </button>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="overlays-bg hidden" style="z-index: 10000;">
    <div class="settings-modal modal-card">
      <div class="modal-header">
        <h2>Nastavení hry</h2>
        <button class="btn-icon" onclick="window.toggleSettingsModal()" aria-label="Zavřít">✖</button>
      </div>
      <div class="modal-body">
        
        <div class="settings-group">
          <h3>Zvuk a Hudba</h3>
          <div class="setting-row">
            <label for="sfx-volume">Zvukové efekty</label>
            <div class="volume-slider-wrap">
              <span id="sfx-vol-val" class="vol-label">100%</span>
              <input id="sfx-volume" type="range" min="0" max="100" value="100" oninput="window.setSfxVolume(this.value)">
            </div>
          </div>
          <div class="setting-row">
            <label for="music-volume">Hudba v pozadí</label>
            <div class="volume-slider-wrap">
              <span id="music-vol-val" class="vol-label">50%</span>
              <input id="music-volume" type="range" min="0" max="100" value="50" oninput="window.setMusicVolume(this.value)">
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>Zobrazení</h3>
          <div class="setting-row">
            <label>Režim celé obrazovky</label>
            <button class="btn btn-outline btn-sm" onclick="window.toggleFullscreen()">Přepnout Fullscreen</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Trade Modal -->
  <div id="trade-overlay" class="overlays-bg hidden" style="z-index: 10010;">
    <div class="trade-modal modal-card">
      <div class="modal-header">
        <h2 id="trade-title">🤝 Obchod</h2>
        <button class="btn-icon" id="trade-close-btn" aria-label="Zavřít">✖</button>
      </div>
      <div id="trade-content" class="modal-body">
        <!-- Obsah obchodu bude generován dynamicky -->
      </div>
    </div>
  </div>

  <!-- Debt/Bankruptcy Modal -->
  <div id="debt-overlay" class="overlays-bg hidden" style="z-index: 10005;">
    <div class="debt-modal modal-card">
      <div class="modal-header">
        <h2 id="debt-title">💸 Řešení dluhu</h2>
      </div>
      <div id="debt-content" class="modal-body">
        <!-- Obsah bude generován dynamicky -->
      </div>
    </div>
  </div>

  <div id="app-root"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
