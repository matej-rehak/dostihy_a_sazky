  <!-- ═══════════════════════════════════════════════════════════ INTRO -->
  <div id="intro-view">
    <div class="lobby-bg-glow"></div>
    <div class="lobby-card" style="width: 500px;">
      <div class="lobby-hero">
        <div class="lobby-emoji">🏇</div>
        <h1 class="lobby-title">DOSTIHY<br />A SÁZKY</h1>
      </div>

      <div id="room-selection">
        <button id="show-create-room" class="btn btn-gold" style="width:100%">+ Vytvořit novou místnost</button>
        <div class="bc-divider" style="margin: 15px auto; width: 100%;"></div>
        <p class="label-sm">Dostupné hry:</p>
        <div id="room-list" class="room-list">
          <p class="dim">Hledám volné místnosti...</p>
        </div>
      </div>

      <!-- Create Room Form (initially hidden) -->
      <div id="room-create-form" class="hidden">
        <div class="config-panel">
          <div class="config-row">
            <label>Tvoje jméno:</label>
            <input type="text" id="new-room-player-name" class="text-input" placeholder="Např. Matej" maxlength="20" autocomplete="off" />
          </div>
          <div class="config-row">
            <label>Název místnosti:</label>
            <input type="text" id="new-room-name" class="text-input" placeholder="Moje hra..." maxlength="20" />
          </div>
          <div class="config-row">
            <label>Heslo (volitelné):</label>
            <input type="password" id="new-room-pass" class="text-input" placeholder="Zadejte heslo..." />
          </div>
          <div class="config-row" style="align-items:center;">
            <label>Barva figurky:</label>
            <div id="new-room-color-picker" class="color-picker"></div>
          </div>
        </div>
        <div class="action-buttons row">
          <button id="room-create-btn" class="btn btn-green" style="flex:1">Vytvořit</button>
          <button id="cancel-create-btn" class="btn btn-outline" style="flex:1">Zrušit</button>
        </div>
      </div>
    </div>
  </div>
